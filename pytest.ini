# Task Station has NO third-party dependencies — the suite is plain stdlib
# `unittest` and runs equally with `python3 -m unittest discover -s tests`.
# This file just lets `pytest` (if you have it installed) discover the same
# tests. tests/conftest.py pins TASK_STATION_HOME to a throwaway tmpdir for
# isolation before any test imports the engine.
[pytest]
testpaths = tests
